<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Playground — kube.io</title><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#131316;color:#ededec;font-family:InterVariable,Inter,system-ui,sans-serif;min-height:100vh}
.hidden-svg{position:absolute;width:0;height:0;overflow:hidden}
h1{text-align:center;padding:24px 0 8px;font-size:1.1rem;font-weight:600;color:#c8a87c}
.sub{text-align:center;font-size:0.7rem;color:#888;margin-bottom:20px}

.pg{max-width:1100px;margin:0 auto;padding:0 16px 40px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:800px){.pg{grid-template-columns:1fr}}
.panel{background:#1a1a1e;border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,0.06)}
.panel h3{font-size:0.7rem;color:#999;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.05em;text-align:center}
.panel canvas{display:block;margin:0 auto;border-radius:4px}

/* Preview scene */
.prev-scene{position:relative;width:260px;height:200px;margin:0 auto;border-radius:10px;overflow:hidden;
  background:
    linear-gradient(to right,rgba(0,0,0,0.1) 1px,transparent 1px),
    linear-gradient(to bottom,rgba(0,0,0,0.1) 1px,transparent 1px),
    radial-gradient(circle at 30% 40%,rgba(255,120,80,0.5),transparent 55%),
    radial-gradient(circle at 70% 60%,rgba(80,150,255,0.5),transparent 55%);
  background-size:20px 20px,20px 20px,100% 100%,100% 100%;
  background-color:#f0ece6;
}
.prev-scene .lens{
  position:absolute;width:130px;height:130px;border-radius:30px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  border:1.5px solid rgba(0,0,0,0.2);
  box-shadow:0 8px 28px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.08);
  cursor:grab;user-select:none;
}
.prev-scene .lens:active{cursor:grabbing}

/* Controls */
.ctrls{max-width:1100px;margin:0 auto 20px;padding:0 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center}
.ctrls label{font-size:0.65rem;color:#aaa;display:flex;align-items:center;gap:4px;white-space:nowrap}
.ctrls input[type=range]{width:65px;height:3px;accent-color:#c8a87c}
.ctrls select{font-size:0.65rem;background:#222;color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:2px 6px}
</style></head><body>
<h1>Playground</h1>
<p class="sub">Surface Controls — tweak surface shape, bezel width, glass thickness, and scale. Watch the refraction field, displacement map, and preview update.</p>
<svg class="hidden-svg" id="svgBank"></svg>

<div class="ctrls">
  <label>Surface <select id="surf"><option value="circle">Convex Circle</option><option value="squircle" selected>Convex Squircle</option><option value="concave">Concave</option><option value="lip">Lip</option></select></label>
  <label>Bezel Width <input type="range" min="5" max="60" value="20" id="bezel"></label>
  <label>Glass Thickness <input type="range" min="2" max="40" value="14" id="thick"></label>
  <label>Scale <input type="range" min="0" max="100" value="35" id="scale"></label>
</div>

<div class="pg">
  <div class="panel">
    <h3>Radius Simulation — Displacement vs Distance</h3>
    <canvas id="radiusCanvas" width="400" height="140"></canvas>
  </div>
  <div class="panel">
    <h3>Displacement Map (R=X, G=Y, 128=neutral)</h3>
    <canvas id="mapCanvas" width="160" height="160"></canvas>
  </div>
  <div class="panel" style="grid-column:1/-1;">
    <h3>Preview — filter</h3>
    <div class="prev-scene" id="prevScene">
      <div class="lens" id="lens" style="filter:url(#pg);-webkit-filter:url(#pg);"></div>
    </div>
  </div>
</div>

<script>
const IOR=1.5,M=200; // map size
const lensW=130,lensH=130,lensR=30;

// Surface functions
const Surfaces={
  circle(x){const d=1-Math.max(0,Math.min(1,x));return d<=0?1:Math.sqrt(1-d*d)},
  squircle(x){const d=1-Math.max(0,Math.min(1,x));return d<=0?1:Math.pow(1-Math.pow(d,4),0.25)},
  concave(x){return 1-Surfaces.squircle(x)},
  lip(x){
    const t=smootherstep(Math.max(0,Math.min(1,x)));
    return Surfaces.squircle(x)*(1-t)+(1-Surfaces.squircle(x))*t;
  }
};
function smootherstep(t){const x=Math.max(0,Math.min(1,t));return x*x*x*(x*(x*6-15)+10)}

// SDF for rounded rect
function sdRR(px,py,hw,hh,r){
  const dx=Math.abs(px)-hw+r,dy=Math.abs(py)-hh+r;
  return Math.sqrt(Math.max(dx,0)**2+Math.max(dy,0)**2)+Math.min(Math.max(dx,dy),0)-r;
}

// Compute Snell displacement on one radius
function computeSnell(surfName,bezel,thick,N=128){
  const fn=Surfaces[surfName],samples=[],dlt=0.0005;
  for(let i=0;i<N;i++){
    const x=i/(N-1),h=fn(x)*thick;
    const xm=Math.max(0,x-dlt),xp=Math.min(1,x+dlt);
    const der=(fn(xp)-fn(xm))/(xp-xm);
    const nx=-der,ny=1,nL=Math.sqrt(nx*nx+ny*ny);
    const cosT=Math.abs(ny)/nL,t1=Math.acos(Math.min(1,cosT));
    const s2=Math.sin(t1)/IOR;
    let ds; if(s2>=1)ds=h*Math.tan(t1); else ds=h*Math.tan(Math.asin(s2));
    samples.push({t:x,der,ab:ds,mg:ds*(der>=0?-1:1)});
  }
  return samples;
}

// Build displacement map (SDF-based, real-time)
function buildMap(size,W,H,R,bezel,samples,maxDisp){
  const c=document.createElement('canvas');c.width=c.height=size;
  const ctx=c.getContext('2d'),img=ctx.createImageData(size,size),d=img.data;
  const cx=size/2,cy=size/2,bw=bezel*1.2,mdp=maxDisp||1;
  for(let y=0;y<size;y++){for(let x=0;x<size;x++){
    const i=(y*size+x)*4,px=x-cx,py=y-cy;
    const sdf=sdRR(px,py,W/2,H/2,R),bd=-sdf;
    const t=Math.max(0,Math.min(1,bd/bw));
    if(t<=0.003||t>=0.997){d[i]=128;d[i+1]=128;d[i+2]=0;d[i+3]=255;continue;}
    const si=Math.round(t*(samples.length-1));
    const s=samples[Math.max(0,Math.min(samples.length-1,si))];
    const gd=0.5;
    const gx=sdRR(px+gd,py,W/2,H/2,R)-sdRR(px-gd,py,W/2,H/2,R);
    const gy=sdRR(px,py+gd,W/2,H/2,R)-sdRR(px,py-gd,W/2,H/2,R);
    const gL=Math.sqrt(gx*gx+gy*gy)||1;
    // Direction: SDF gradient outward. Convex(mg<0)→inward=opposite.
    const nm=s.ab/mdp,sg=s.mg<0?-1:1;
    const dx=-(gx/gL)*nm*sg,dy=-(gy/gL)*nm*sg;
    d[i]=Math.max(0,Math.min(255,Math.round(128+dx*127)));
    d[i+1]=Math.max(0,Math.min(255,Math.round(128+dy*127)));
    d[i+2]=0;d[i+3]=255;
  }}
  ctx.putImageData(img,0,0);return c;
}

// Build filter
function buildFilter(mapURL,scale){
  return '<filter id="pg" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">'+
    '<feGaussianBlur in="SourceGraphic" stdDeviation="2" result="bl"/>'+
    '<feImage href="'+mapURL+'" x="0" y="0" width="'+M+'" height="'+M+'" result="dm"/>'+
    '<feDisplacementMap in="bl" in2="dm" scale="'+scale+'" xChannelSelector="R" yChannelSelector="G"/>'+
    '</filter>';
}

// Draw radius simulation
function drawRadius(canvasId,samples,maxDisp,bezel,thick){
  const c=document.getElementById(canvasId),W=c.width,H=c.height;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#1a1a1e';ctx.fillRect(0,0,W,H);
  const mx=30,my=20,pw=W-50,ph=H-40;
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let i=0;i<=8;i++){const y=my+ph*i/8;ctx.beginPath();ctx.moveTo(mx,y);ctx.lineTo(mx+pw,y);ctx.stroke();}
  // Zero line
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
  const zy=my+ph*0.5;
  ctx.beginPath();ctx.moveTo(mx,zy);ctx.lineTo(mx+pw,zy);ctx.stroke();
  // Curve
  ctx.strokeStyle='#c8a87c';ctx.lineWidth=2.5;ctx.beginPath();
  for(let i=0;i<samples.length;i++){
    const x=mx+samples[i].t*pw;
    const y=zy-samples[i].mg/Math.max(maxDisp,1)*ph*0.45;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.stroke();
  // Labels
  ctx.fillStyle='#888';ctx.font='9px system-ui';
  ctx.fillText('Max displacement: '+maxDisp.toFixed(1)+'px',mx,11);
  ctx.fillText('Outer edge (t=0)',mx,H-5);
  ctx.fillText('Inner flat (t=1)',mx+pw-80,H-5);
  ctx.fillText('bezel='+bezel+'px thick='+thick+'px',mx+pw-160,11);
}

// Update everything
function update(){
  const surfName=document.getElementById('surf').value;
  const bezel=parseInt(document.getElementById('bezel').value);
  const thick=parseInt(document.getElementById('thick').value);
  const scale=parseInt(document.getElementById('scale').value);

  const samples=computeSnell(surfName,bezel,thick,128);
  const maxDisp=Math.max(...samples.map(s=>s.ab),1);

  // Radius simulation
  drawRadius('radiusCanvas',samples,maxDisp,bezel,thick);

  // Displacement map
  const mapCanvas=buildMap(M,lensW,lensH,lensR,bezel,samples,maxDisp);
  const mCtx=document.getElementById('mapCanvas').getContext('2d');
  mCtx.clearRect(0,0,160,160);
  mCtx.drawImage(mapCanvas,0,0,160,160);

  // SVG filter + apply
  const mapURL=mapCanvas.toDataURL();
  const fHTML=buildFilter(mapURL,scale);
  document.getElementById('svgBank').innerHTML='<defs>'+fHTML+'</defs>';

  const lens=document.getElementById('lens');
  lens.style.filter='url(#pg)';lens.style.webkitFilter='url(#pg)';
}
update();

// Controls
['surf','bezel','thick','scale'].forEach(id=>document.getElementById(id).addEventListener('input',update));

// Drag lens
const lens=document.getElementById('lens'),scene=document.getElementById('prevScene');
let dr=false,lx=0,ly=0,ox=0,oy=0;
lens.addEventListener('pointerdown',e=>{dr=true;lx=e.clientX;ly=e.clientY;e.target.setPointerCapture(e.pointerId);});
window.addEventListener('pointermove',e=>{if(!dr)return;ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;lens.style.transform='translate(calc(-50% + '+ox+'px), calc(-50% + '+oy+'px))';});
window.addEventListener('pointerup',()=>{dr=false;});
</script></body></html>
