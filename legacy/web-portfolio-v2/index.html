<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LENS — Minimal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }

    :root {
      --bg: #fafaf8;
      --card-bg: #fff;
      --text: #1a1a1a;
      --text-2: #666;
      --text-3: #999;
      --border: #e8e8e4;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ====== 顶栏 ====== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,250,248,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header__logo {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem; font-weight: 600;
      letter-spacing: 0.15em;
    }
    .header__nav { display: flex; gap: 24px; }
    .header__nav button {
      font-family: inherit; font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.08em;
      background: none; border: none; color: var(--text-2);
      cursor: pointer; padding: 6px 0;
      transition: color 0.25s ease;
      position: relative;
    }
    .header__nav button::after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1.5px;
      background: var(--text); transition: width 0.3s var(--ease);
    }
    .header__nav button:hover,
    .header__nav button.active { color: var(--text); }
    .header__nav button.active::after { width: 100%; }

    /* ====== 网格 ====== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2px;
      background: var(--border);
    }
    .grid__item {
      background: var(--card-bg);
      cursor: pointer; overflow: hidden;
      position: relative;
      aspect-ratio: 1;
      transition: filter 0.4s ease;
    }
    .grid__item img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s var(--ease);
    }
    .grid__item:hover img { transform: scale(1.04); }
    .grid__item:hover { filter: brightness(1.02); }

    .grid__meta {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .grid__item:hover .grid__meta { opacity: 1; }
    .grid__meta-title {
      color: #fff; font-size: 0.95rem; font-weight: 500;
      letter-spacing: 0.04em;
    }
    .grid__meta-cat {
      color: rgba(255,255,255,0.6); font-size: 0.7rem;
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px;
    }

    /* ====== 分类标签 ====== */
    .categories-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    .cat-chip {
      font-family: inherit; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.05em;
      padding: 8px 18px;
      border-radius: 100px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-2); cursor: pointer;
      transition: all 0.3s ease;
    }
    .cat-chip:hover { border-color: #aaa; color: var(--text); }
    .cat-chip.active { background: var(--text); color: #fff; border-color: var(--text); }

    /* ====== 灯箱 ====== */
    .lightbox {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(255,255,255,0.95);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease, visibility 0s 0.4s;
    }
    .lightbox.active { opacity: 1; visibility: visible; transition: opacity 0.4s ease, visibility 0s 0s; }
    .lightbox img {
      max-width: 92vw; max-height: 90vh; object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }
    .lightbox__close {
      position: absolute; top: 24px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.05); border: none;
      font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      transition: all 0.3s ease;
    }
    .lightbox__close:hover { background: rgba(0,0,0,0.1); color: var(--text); }
    .lightbox__nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.04); border: none;
      font-size: 1.4rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      transition: all 0.3s ease;
    }
    .lightbox__nav:hover { background: rgba(0,0,0,0.1); color: var(--text); }
    .lightbox__nav--prev { left: 24px; }
    .lightbox__nav--next { right: 24px; }

    /* ====== 空状态 ====== */
    .empty { text-align: center; padding: 120px 32px; color: var(--text-3); }
    .empty h3 { font-weight: 400; font-size: 1.2rem; margin-bottom: 8px; }

    /* ====== 响应式 ====== */
    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
      .header { padding: 14px 20px; }
      .categories-bar { padding: 16px 20px; }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header__logo">LENS</div>
    <nav class="header__nav" id="nav"></nav>
  </header>

  <div class="categories-bar" id="cat-bar"></div>

  <section class="grid" id="grid"></section>

  <div class="empty" id="empty" style="display:none">
    <h3>没有照片</h3>
    <p>请确保 photos.js 已正确加载</p>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox__close" id="lb-close">&times;</button>
    <button class="lightbox__nav lightbox__nav--prev" id="lb-prev">&lsaquo;</button>
    <button class="lightbox__nav lightbox__nav--next" id="lb-next">&rsaquo;</button>
    <img id="lb-img" src="" alt="">
  </div>

  <script src="../web-portfolio/photos.js"></script>
  <script>
    (function() {
      if (typeof PHOTOS_DATA === 'undefined') return;

      const photos = PHOTOS_DATA.photos;
      const categories = PHOTOS_DATA.categories;

      const grid = document.getElementById('grid');
      const catBar = document.getElementById('cat-bar');
      const nav = document.getElementById('nav');
      const empty = document.getElementById('empty');
      let activeCat = null;

      // ====== 导航 ======
      function renderNav() {
        const allBtn = document.createElement('button');
        allBtn.textContent = '全部';
        allBtn.classList.add('active');
        allBtn.addEventListener('click', () => filterBy(null));
        nav.appendChild(allBtn);

        categories.forEach(cat => {
          const btn = document.createElement('button');
          btn.textContent = cat;
          btn.addEventListener('click', () => filterBy(cat));
          nav.appendChild(btn);
        });
      }

      // ====== 分类标签 ======
      function renderCatBar(current) {
        catBar.innerHTML = '';
        const allChip = document.createElement('button');
        allChip.className = 'cat-chip' + (!current ? ' active' : '');
        allChip.textContent = 'All';
        allChip.addEventListener('click', () => filterBy(null));
        catBar.appendChild(allChip);

        categories.forEach(cat => {
          const chip = document.createElement('button');
          chip.className = 'cat-chip' + (cat === current ? ' active' : '');
          chip.textContent = cat;
          chip.addEventListener('click', () => filterBy(cat));
          catBar.appendChild(chip);
        });
      }

      // ====== 渲染网格 ======
      function renderGrid(filter) {
        grid.innerHTML = '';
        const filtered = filter
          ? photos.filter(p => p.category === filter)
          : photos;

        if (filtered.length === 0) {
          grid.style.display = 'none';
          empty.style.display = 'block';
          return;
        }
        grid.style.display = '';
        empty.style.display = 'none';

        const fragment = document.createDocumentFragment();
        filtered.forEach((p, i) => {
          const item = document.createElement('div');
          item.className = 'grid__item';
          item.style.animationDelay = `${i * 0.03}s`;
          item.innerHTML = `
            <img src="${p.src}" alt="${p.title}" loading="lazy">
            <div class="grid__meta">
              <div class="grid__meta-title">${p.title}</div>
              <div class="grid__meta-cat">${p.category}</div>
            </div>
          `;
          item.addEventListener('click', () => openLightbox(filtered, i));
          fragment.appendChild(item);
        });
        grid.appendChild(fragment);
      }

      function filterBy(cat) {
        activeCat = cat;
        // 更新导航
        nav.querySelectorAll('button').forEach(b => {
          b.classList.toggle('active', b.textContent === (cat || '全部'));
        });
        // 更新标签栏
        catBar.querySelectorAll('.cat-chip').forEach(c => {
          c.classList.toggle('active', c.textContent === (cat || 'All'));
        });
        renderGrid(cat);
      }

      // ====== 灯箱 ======
      let lbPhotos = [], lbIdx = 0;
      const lightbox = document.getElementById('lightbox');
      const lbImg = document.getElementById('lb-img');

      function openLightbox(list, index) {
        lbPhotos = list; lbIdx = index;
        const p = lbPhotos[lbIdx];
        lbImg.src = p.src; lbImg.alt = p.title;
        lightbox.classList.add('active');
      }
      function closeLightbox() { lightbox.classList.remove('active'); }
      function lbPrev() {
        lbIdx = (lbIdx - 1 + lbPhotos.length) % lbPhotos.length;
        lbImg.src = lbPhotos[lbIdx].src;
      }
      function lbNext() {
        lbIdx = (lbIdx + 1) % lbPhotos.length;
        lbImg.src = lbPhotos[lbIdx].src;
      }

      document.getElementById('lb-close').addEventListener('click', closeLightbox);
      document.getElementById('lb-prev').addEventListener('click', lbPrev);
      document.getElementById('lb-next').addEventListener('click', lbNext);
      lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') lbPrev();
        if (e.key === 'ArrowRight') lbNext();
      });

      // 滚轮切换
      lightbox.addEventListener('wheel', e => {
        e.preventDefault();
        e.deltaY > 0 ? lbNext() : lbPrev();
      }, { passive: false });

      // ====== 启动 ======
      if (photos.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
      } else {
        renderNav();
        renderCatBar(null);
        renderGrid(null);
      }
    })();
  </script>
</body>
</html>
