<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Basic Test</title><style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{background:#111}
.circle{
  position:fixed;inset:0;margin:auto;
  width:300px;height:300px;border-radius:50%;
  border:3px solid #fff;
  background:rgba(255,255,255,0.1);
}
.x{
  position:fixed;top:50%;left:50%;
  width:10px;height:10px;background:red;
  transform:translate(-50%,-50%);
}
</style></head><body>
<div class="circle" id="c"><h1 style="color:#fff;text-align:center;margin-top:120px">TEST</h1></div>
<div class="x"></div>
<script>
const c=document.getElementById('c');
document.getElementById('c').addEventListener('pointerdown',e=>{
  let dx=0,dy=0,lx=e.clientX,ly=e.clientY;
  function mv(ev){dx+=ev.clientX-lx;dy+=ev.clientY-ly;lx=ev.clientX;ly=ev.clientY;c.style.transform='translate('+dx+'px,'+dy+'px)';}
  function up(){window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);}
  window.addEventListener('pointermove',mv);window.addEventListener('pointerup',up);
  e.target.setPointerCapture(e.pointerId);
});
</script></body></html>
