<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LENS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== 侧边栏触发区 ====== -->
  <div class="sidebar-trigger" id="sidebar-trigger"></div>

  <!-- ====== 侧边栏 (Finder 风格, 悬浮圆角) ====== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <svg class="sidebar__header-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <span>文件夹</span>
    </div>
    <div class="sidebar__list" id="sidebar-list"></div>
    <div class="sidebar__add" id="sidebar-add">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>添加文件夹</span>
    </div>
  </aside>

  <!-- ====== 主内容区 ====== -->
  <div class="main-area">

  <!-- ====== Hero ====== -->
  <section class="hero" id="hero">
    <div class="hero__slides" id="hero-slides"></div>
    <div class="hero__overlay"></div>
    <div class="hero__content">
      <h1 class="hero__title">LENS</h1>
      <p class="hero__subtitle">Photography Portfolio</p>
    </div>
    <a href="#portfolio" class="hero__scroll">
      <span class="hero__scroll-line"></span>
    </a>
  </section>

  <!-- ====== Portfolio ====== -->
  <section class="portfolio" id="portfolio">
    <div class="portfolio__header">
      <h2 class="portfolio__title" id="section-title">Selected Works</h2>
      <p class="portfolio__desc">每一帧光影 · 皆是时间的切片</p>
    </div>

    <!-- 分类卡片 -->
    <div class="categories" id="categories"></div>

    <!-- 画廊 -->
    <div class="gallery" id="gallery" style="display:none;">
      <div class="gallery__nav">
        <button class="gallery__back" id="gallery-back">← 返回</button>
        <span class="gallery__info" id="gallery-info"></span>
      </div>
      <div class="gallery__grid" id="gallery-grid"></div>
      <div class="gallery__more" id="gallery-more" style="display:none;">
        <button class="load-more-btn" id="load-more">加载更多</button>
      </div>
    </div>
  </section>

  <!-- ====== 灯箱 ====== -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox__close">✕</button>
    <button class="lightbox__prev">‹</button>
    <button class="lightbox__next">›</button>
    <div class="lightbox__content">
      <img class="lightbox__img" src="" alt="">
      <div class="lightbox__title"></div>
      <div class="lightbox__counter"></div>
      <div class="lightbox__rating" id="lightbox-rating">
        <div class="rating__stars" id="rating-stars">
          <button class="rating__star" data-v="1"></button>
          <button class="rating__star" data-v="2"></button>
          <button class="rating__star" data-v="3"></button>
          <button class="rating__star" data-v="4"></button>
          <button class="rating__star" data-v="5"></button>
        </div>
        <button class="rating__fav" id="rating-fav" aria-label="收藏"></button>
      </div>
    </div>
    <!-- 胶片条 -->
    <div class="lightbox__filmstrip" id="lightbox-filmstrip">
      <button class="filmstrip__arrow filmstrip__arrow--left" id="filmstrip-left">‹</button>
      <div class="filmstrip__track" id="filmstrip-track"></div>
      <button class="filmstrip__arrow filmstrip__arrow--right" id="filmstrip-right">›</button>
    </div>
    <div class="lightbox__exif" id="lightbox-exif">
      <div class="exif__row exif__row--main">
        <span class="exif__tag exif__tag--camera"></span>
        <span class="exif__tag exif__tag--lens"></span>
      </div>
      <div class="exif__row exif__row--params">
        <span class="exif__tag exif__tag--aperture"></span>
        <span class="exif__tag exif__tag--shutter"></span>
        <span class="exif__tag exif__tag--iso"></span>
        <span class="exif__tag exif__tag--focal"></span>
      </div>
      <div class="exif__row exif__row--meta">
        <span class="exif__tag exif__tag--date"></span>
        <span class="exif__tag exif__tag--dims"></span>
        <span class="exif__tag exif__tag--size"></span>
      </div>
    </div>
  </div>

  <!-- ====== 幻灯片 ====== -->
  <div class="slideshow" id="slideshow">
    <div class="slideshow__img-wrap">
      <img class="slideshow__img" id="slideshow-img" src="" alt="">
    </div>
    <div class="slideshow__controls" id="slideshow-controls">
      <span class="slideshow__counter" id="slideshow-counter"></span>
      <div class="slideshow__btns">
        <button class="slideshow__btn" id="sl-prev">← 上一张</button>
        <button class="slideshow__btn" id="sl-pause">暂停</button>
        <button class="slideshow__btn" id="sl-next">下一张 →</button>
      </div>
      <div class="slideshow__zoom">
        <button class="slideshow__btn" id="sl-zoom-out">−</button>
        <button class="slideshow__btn" id="sl-fit">适配</button>
        <button class="slideshow__btn" id="sl-zoom-in">+</button>
        <button class="slideshow__btn" id="sl-orig">1:1</button>
      </div>
      <button class="slideshow__btn" id="sl-exit">退出</button>
    </div>
  </div>

  <!-- ====== 工具栏 ====== -->
  <div class="toolbar" id="toolbar">
    <button class="toolbar__btn" id="tb-folder">文件夹</button>
    <button class="toolbar__btn" id="tb-slideshow">幻灯片</button>
    <button class="toolbar__btn" id="tb-settings">更多</button>
  </div>

  <!-- ====== 设置面板 ====== -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-panel__item">
      <span class="settings-panel__label">EXIF 信息</span>
      <button class="toggle-switch" data-key="exif" aria-label="EXIF 信息开关"></button>
    </div>
    <div class="settings-panel__item">
      <span class="settings-panel__label">星级评分</span>
      <button class="toggle-switch" data-key="rating" aria-label="星级评分开关"></button>
    </div>
    <div class="settings-panel__item">
      <span class="settings-panel__label">胶片条</span>
      <button class="toggle-switch" data-key="filmstrip" aria-label="胶片条开关"></button>
    </div>
    <div class="settings-panel__item">
      <span class="settings-panel__label">快捷键提示</span>
      <button class="toggle-switch" data-key="shortcuts" aria-label="快捷键提示开关"></button>
    </div>
    <div class="settings-panel__item">
      <span class="settings-panel__label">筛选排序</span>
      <button class="toggle-switch" data-key="sortFilter" aria-label="筛选排序开关"></button>
    </div>
    <div class="settings-panel__divider"></div>
    <div class="settings-panel__item">
      <span class="settings-panel__label">缩略图密度</span>
      <div class="density-btns">
        <button class="density-btn" data-density="s">小</button>
        <button class="density-btn density-btn--active" data-density="m">中</button>
        <button class="density-btn" data-density="l">大</button>
      </div>
    </div>
    <div class="settings-panel__divider"></div>
    <div class="settings-panel__item">
      <span class="settings-panel__label">RAW 预览</span>
      <button class="toggle-switch" data-key="rawScan" aria-label="RAW 预览开关"></button>
    </div>
  </div>

    <!-- 一键回顶部 -->
    <button class="back-to-top" id="back-to-top" aria-label="回到顶部">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>

  </div><!-- /main-area -->

  <script type="module" src="main.js"></script>
</body>
</html>
