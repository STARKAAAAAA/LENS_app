<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>液态玻璃 — 全方案对比测试</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a08; color: #ccc; font-family: system-ui, sans-serif; min-height: 100vh; padding: 16px; }
  h1 { text-align: center; font-size: 1.2rem; color: #c8a87c; margin-bottom: 4px; }
  .sub { text-align: center; opacity: 0.45; font-size: 0.75rem; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px,1fr)); gap: 12px; max-width: 1900px; margin: 0 auto; }
  .box { background: #141412; border-radius: 12px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); }
  .box h3 { font-size: 0.8rem; color: #c8a87c; margin-bottom: 2px; }
  .box .desc { font-size: 0.65rem; opacity: 0.4; margin-bottom: 8px; line-height: 1.3; }
  .stage { position: relative; width: 100%; height: 160px; border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
  .stage-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.3) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.3) 1px, transparent 1px),
      linear-gradient(45deg, #ff3366 25%, transparent 25%, transparent 75%, #ff3366 75%),
      linear-gradient(45deg, #ff3366 25%, #00ccff 25%, #00ccff 75%, #ff3366 75%);
    background-size: 20px 20px, 20px 20px, 40px 40px, 40px 40px;
    background-position: 0 0, 0 0, 0 0, 20px 20px;
  }
  .lens {
    position: absolute; width: 100px; height: 100px; border-radius: 24px;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.03);
    box-shadow: 0 6px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.12);
    cursor: grab; user-select: none;
  }
  .lens.wide { width: 85%; height: 85%; }
  .thumb-row { display: flex; gap: 6px; align-items: center; }
  .thumb-row canvas { border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); width: 48px; height: 48px; image-rendering: pixelated; }
  .thumb-row span { font-size: 0.6rem; opacity: 0.35; }
  .btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .btns button {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: #999; padding: 3px 8px; border-radius: 5px; cursor: pointer; font-size: 0.65rem;
  }
  .btns button:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .btns button.on { background: rgba(200,168,124,0.2); border-color: rgba(200,168,124,0.4); color: #c8a87c; }
  .hidden-svg { position: absolute; width: 0; height: 0; overflow: hidden; pointer-events: none; }
</style>
</head>
<body>

<h1>液态玻璃 — 全方案 A/B 对比</h1>
<p class="sub">拖动透镜看折射 | <button id="luma-overlay-toggle" style="font-size:0.7rem;padding:2px 10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#c8a87c;border-radius:4px;cursor:pointer;">🔍 全屏亮度扫描 OFF</button></p>
<div class="grid" id="grid"></div>
<canvas id="luma-overlay" style="display:none;position:fixed;inset:0;z-index:99999;pointer-events:none;"></canvas>

<script type="module">
const MAP_SZ = 256;

// ── 位移图生成 ──

// 圆角矩形 SDF (Signed Distance Field)
// 返回点到圆角矩形边缘的带符号距离: 内部负, 边缘零, 外部正
function sdRoundedBox(px, py, hw, hh, r) {
  const dx = Math.abs(px) - hw + r;
  const dy = Math.abs(py) - hh + r;
  return Math.sqrt(Math.max(dx, 0) ** 2 + Math.max(dy, 0) ** 2) + Math.min(Math.max(dx, dy), 0) - r;
}

function makeNeutralMap() {
  const c = document.createElement('canvas'); c.width = c.height = MAP_SZ;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(MAP_SZ, MAP_SZ);
  for (let i = 0; i < img.data.length; i += 4) {
    img.data[i] = img.data[i+1] = img.data[i+2] = 128; img.data[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

function makePowerMap(power = 3) {
  const c = document.createElement('canvas'); c.width = c.height = MAP_SZ;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(MAP_SZ, MAP_SZ);
  const d = img.data;
  for (let y = 0; y < MAP_SZ; y++) {
    for (let x = 0; x < MAP_SZ; x++) {
      const nx = (x / MAP_SZ - 0.5) * 2, ny = (y / MAP_SZ - 0.5) * 2;
      const dist = Math.sqrt(nx*nx + ny*ny);
      const str = Math.pow(Math.min(1, dist), power);
      const i = (y * MAP_SZ + x) * 4;
      d[i]   = Math.max(0, Math.min(255, (nx / (dist||1) * str * 0.5 + 0.5) * 255));
      d[i+1] = Math.max(0, Math.min(255, (ny / (dist||1) * str * 0.5 + 0.5) * 255));
      d[i+2] = 128; d[i+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

function makeSmoothstepRingMap(peak = 0.82, clearZone = 0.35) {
  const c = document.createElement('canvas'); c.width = c.height = MAP_SZ;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(MAP_SZ, MAP_SZ);
  const d = img.data;
  const ss = t => t * t * (3 - 2 * t);
  for (let y = 0; y < MAP_SZ; y++) {
    for (let x = 0; x < MAP_SZ; x++) {
      const nx = (x / MAP_SZ - 0.5) * 2, ny = (y / MAP_SZ - 0.5) * 2;
      const dist = Math.sqrt(nx*nx + ny*ny);
      const i = (y * MAP_SZ + x) * 4;
      let str;
      if (dist < clearZone) str = 0;
      else if (dist <= peak) str = ss((dist - clearZone) / (peak - clearZone));
      else if (dist < 1) str = 1 - ss((dist - peak) / (1 - peak));
      else str = 0;
      if (str < 0.002) { d[i]=d[i+1]=d[i+2]=128; d[i+3]=255; continue; }
      d[i]   = Math.max(0, Math.min(255, (nx/dist * str * 0.5 + 0.5) * 255));
      d[i+1] = Math.max(0, Math.min(255, (ny/dist * str * 0.5 + 0.5) * 255));
      d[i+2] = 128; d[i+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

// ══ CodeSandbox / Ekino 原文位移图 ══
// 核心: 全区域线性渐变 + 中性灰圆角矩形挖空 + 模糊
// X渐变: #F00(full red) → #000(black), 左边缘R=255推右, 右边缘R=0推左
// Y渐变: #0F0(full green) → #000(black), 上边缘G=255推下, 下边缘G=0推上
// 挖空: 内缩depth像素的#808080圆角矩形 + blur(depth px) → 中心擦除,边缘环留
// 与主程序 lg-studio.js _buildMap / lg-panels.js _genMap 完全一致
function makeSDFMap(w, h, br, { depth = 10 } = {}) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const d = img.data;
  const hw = w / 2, hh = h / 2;
  const ss = t => t * t * (3 - 2 * t);

  const gsx = Math.ceil((br / w) * 15) / 100, gex = 1 - gsx;
  const gsy = Math.ceil((br / h) * 15) / 100, gey = 1 - gsy;

  const cutW = w - 2 * depth, cutH = h - 2 * depth;
  const cutHw = cutW / 2, cutHh = cutH / 2;
  const cutR = Math.max(0, br - depth);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const ex = x - hw, ey = y - hh;
      const i = (y * w + x) * 4;

      const nx = (ex / hw) * 0.5 + 0.5;
      const tx = Math.max(0, Math.min(1, (nx - gsx) / (gex - gsx || 0.01)));
      const gradR = (1 - tx) * 255;
      const ny = (ey / hh) * 0.5 + 0.5;
      const ty = Math.max(0, Math.min(1, (ny - gsy) / (gey - gsy || 0.01)));
      const gradG = (1 - ty) * 255;

      const cutSdf = sdRoundedBox(ex, ey, cutHw, cutHh, cutR);
      const inside = -cutSdf;
      const cutMask = ss(Math.max(0, Math.min(1, (inside + depth) / (depth * 2 || 1))));

      d[i]     = Math.max(0, Math.min(255, gradR * (1 - cutMask) + 128 * cutMask));
      d[i + 1] = Math.max(0, Math.min(255, gradG * (1 - cutMask) + 128 * cutMask));
      d[i + 2] = 128; d[i + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

// 圆形 SDF — 与主程序 lg-studio.js sdCircle + _buildMap(isCircle) 完全一致
function sdCircleFn(px, py, radius) { return Math.sqrt(px*px+py*py) - radius; }
function makeCircleMap(w, h, depth) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(w, h);
  const d = img.data;
  const hw = w/2, hh = h/2;
  const ss = t => t*t*(3-2*t);
  const r = Math.min(w, h) / 2;
  const gsx = Math.ceil((r/w)*15)/100, gex = 1-gsx;
  const gsy = Math.ceil((r/h)*15)/100, gey = 1-gsy;
  const cutR = Math.max(0, Math.min(w,h)/2 - depth);

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const ex = x - hw, ey = y - hh;
      const i = (y*w+x)*4;
      const nx = (ex/hw)*0.5+0.5;
      const tx = Math.max(0,Math.min(1,(nx-gsx)/(gex-gsx||0.01)));
      const gradR = (1-tx)*255;
      const ny = (ey/hh)*0.5+0.5;
      const ty = Math.max(0,Math.min(1,(ny-gsy)/(gey-gsy||0.01)));
      const gradG = (1-ty)*255;
      const cutSdf = sdCircleFn(ex, ey, cutR);
      const inside = -cutSdf;
      const cutMask = ss(Math.max(0,Math.min(1,(inside+depth)/(depth*2||1))));
      d[i]=Math.max(0,Math.min(255,gradR*(1-cutMask)+128*cutMask));
      d[i+1]=Math.max(0,Math.min(255,gradG*(1-cutMask)+128*cutMask));
      d[i+2]=128;d[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
  return c;
}

// 旧 makeSDFMap 别名 (depth 替代 blurWidth)
function makeCodeSandboxMap(w, h, br, depth) { return makeSDFMap(w, h, br, { depth: depth || 10 }); }

// ── 测试用例 ──
const tests = [
  {
    id: 't0', title: 'A: 纯中性灰 (全128)', desc: 'CONTROL — 位移图全128=零位移。透镜应该完全透明，背景无任何变形。如果这个也有扭曲→滤镜链本身有问题。',
    buildMap: makeNeutralMap, turbulence: false, srgb: true,
  },
  {
    id: 't1', title: 'B: feTurbulence 基线', desc: '有机噪声位移。已知 Electron 中四边有效。用作基准对照。',
    buildMap: null, turbulence: true, turbScale: 100, srgb: true,
  },
  {
    id: 't2', title: 'C: 径向 power=3 + sRGB', desc: 'Canvas径向位移图(旧方案)。中心零→边缘强，单调递增。测试2中验证过的可行方案。',
    buildMap: () => makePowerMap(3), turbulence: false, srgb: true,
  },
  {
    id: 't3', title: 'D: 径向 power=3 + linearRGB', desc: '与C相同但故意不加sRGB。应该只有部分方向有折射(sRGB被linearRGB误读)。',
    buildMap: () => makePowerMap(3), turbulence: false, srgb: false,
  },
  {
    id: 't4', title: 'E: 径向 power=1 线性', desc: 'power=1 线性增加。比power=3中心扭曲更强。对比C看区别。',
    buildMap: () => makePowerMap(1), turbulence: false, srgb: true,
  },
  {
    id: 't5', title: 'F: 径向 power=5 高次', desc: 'power=5。比power=3中心更清晰(位移集中在边缘)。',
    buildMap: () => makePowerMap(5), turbulence: false, srgb: true,
  },
  {
    id: 't6', title: 'G: smoothstep 环状', desc: 'smoothstep环: 0-35%完全零位移→82%峰值→边缘零。理论中心最清晰。',
    buildMap: () => makeSmoothstepRingMap(0.82, 0.35), turbulence: false, srgb: true,
  },
  {
    id: 't7', title: 'H: 环状 + 有机湍流8%', desc: 'G的位移图+8% feTurbulence混合。如果中心扭曲不规则→湍流在中心也有值。',
    buildMap: () => makeSmoothstepRingMap(0.82, 0.35), turbulence: true, turbScale: 8, srgb: true,
  },
  {
    id: 't8', title: 'I: 环状 clearZone=60%', desc: '中心60%完全清零。极端测试：只有最外层40%有折射。验证clearZone是否真的生效。',
    buildMap: () => makeSmoothstepRingMap(0.85, 0.60), turbulence: false, srgb: true,
  },
  {
    id: 't9', title: 'J: 环状(无clear) peak=82%', desc: '确认环状公式本身正确：不加clearZone，直接用smoothstep从0开始。',
    buildMap: () => makeSmoothstepRingMap(0.82, 0), turbulence: false, srgb: true,
  },
  // ── 网上方案 ──
  {
    id: 'w1', title: 'Web1: SVG渐变 dataURL + sRGB', desc: 'Ekino风格：SVG渐变位移图→data:image/svg+xml URL。纯矢量，避免Canvas色彩空间。R/X水平渐变+G/Y垂直渐变。',
    buildMap: null, useSVGGrad: true, turbulence: false, srgb: true,
  },
  {
    id: 'w2', title: 'Web2: feTurbulence(低强度)+径向混合', desc: 'UmarGit变体：feTurbulence baseFrequency=0.005极低频+大模糊，产生柔和有机折射。',
    buildMap: null, turbulenceOnly: true, turbFreq: 0.005, turbBlur: 8, turbScale: 60, srgb: true,
  },
  {
    id: 'w3', title: 'Web3: power2.5 + linearRGB对照', desc: '对照：power=2.5在linearRGB下表现。验证sRGB修复的通用性。',
    buildMap: () => makePowerMap(2.5), turbulence: false, srgb: false,
  },
  // ── SDF 形状匹配 ──
  {
    id: 's1', title: 'SDF1: 100×100 r=24 (匹配透镜)', desc: 'SDF圆角矩形位移图。折射沿真实边缘法线方向，非圆形。透镜100×100 r=24。',
    buildMap: () => makeSDFMap(100, 100, 24, { depth: 20 }), turbulence: false, srgb: true,
  },
  {
    id: 's2', title: 'SDF2: 100×100 r=24 + 有机湍流', desc: 'SDF位移图+8% feTurbulence混合。形状匹配边缘折射+自然不规则感。',
    buildMap: () => makeSDFMap(100, 100, 24, { depth: 20 }), turbulence: true, turbScale: 8, srgb: true,
  },
  {
    id: 's3', title: 'SDF3: 100×100 r=8 小圆角', desc: 'SDF r=8近乎直角。对比r=24看圆角大小如何影响折射。',
    buildMap: () => makeSDFMap(100, 100, 8, { depth: 20 }), turbulence: false, srgb: true,
  },
  {
    id: 's4', title: 'SDF4: DEBUG — 位移图直接显示', desc: '不接滤镜，直接显示位移图作为透镜背景。看到什么颜色=位移图实际内容。中心灰、边缘彩色环才对。',
    buildMap: () => makeSDFMap(100, 100, 24, { depth: 10 }), turbulence: false, srgb: true, debug: true,
  },
  {
    id: 's5', title: '极简验证: 全R=255 纯红位移图', desc: '位移图全R=255, G=128 → 全部像素都向左推。如果这个也没效果→feImage加载Canvas dataURL有根本问题。',
    buildMap: () => {
      const c = document.createElement('canvas'); c.width = c.height = MAP_SZ;
      const ctx = c.getContext('2d');
      const img = ctx.createImageData(MAP_SZ, MAP_SZ);
      for (let i = 0; i < img.data.length; i += 4) {
        img.data[i] = 255; img.data[i+1] = 128; img.data[i+2] = 128; img.data[i+3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      return c;
    }, turbulence: false, srgb: true,
  },
  {
    id: 's6', title: 'SVG版: CodeSandbox原文(内联style+CSS filter)', desc: '完全按CodeSandbox原文: <style>.mix{screen}</style> + filter="blur(2px)" CSS滤镜 + 挖空。',
    useSVGDisplacementMap: true, turbulence: false, srgb: true,
  },
  {
    id: 's7', title: 'SVG版 DEBUG: 位移图直接显示', desc: '同s6但不经滤镜，直接显示SVG位移图。确认CSS mix-blend-mode在feImage中是否工作。',
    useSVGDisplacementMap: true, turbulence: false, srgb: true, debug: true,
  },
  {
    id: 'cs2', title: '【CodeSandbox原版】三图形 + 可拖动 + 效果开关', desc: '完全照搬示例。Debug/色差开关 + 按住透镜深度变化 + 切换背景。',
    codeSandboxBig: true,
  },
  // ══ 自适应玻璃颜色测试 ══
  {
    id: 'adaptive', title: '【自适应玻璃】逐面板背景亮度采样 + 颜色映射', desc: '模拟4种背景亮度(极暗/暗/亮/极亮)→自动调节玻璃brightness/bgAlpha/文字色。拖动透镜测试不同背景。',
    adaptiveGlass: true,
  },
  {
    id: 'lumasubrect', title: '【lumaSubrect】全屏幕亮度可视化 + 采样点测试', desc: '渐变背景上叠加亮度热力图(Canvas) + 可拖动采样点。模拟Apple单像素lumaSubrect行为。',
    lumaSubrect: true,
  },
];

// ── 渲染 ──
const grid = document.getElementById('grid');

tests.forEach(tc => {
  // ── CodeSandbox 三图形完整复刻 ──
  // ── CodeSandbox 三图形 + 背景切换 ──
  if (tc.codeSandboxBig) {
    const configs = [
      { w:200, h:200, r:50, baseDepth:10, blur:2, ca:8, label:'正方形 r=50', id:'sq50' },
      { w:200, h:200, r:100, baseDepth:10, blur:4, ca:0, label:'圆形 r=100', id:'cir100' },
      { w:200, h:200, r:20, baseDepth:10, blur:1, ca:3, label:'正方形 r=20', id:'sq20' },
    ];

    const states = configs.map((c, i) => ({ debug: false, caOn: true, depthMul: 1,
      w: c.w, h: c.h, r: c.r, depth: c.baseDepth, blur: c.blur, ca: c.ca, strength: 100 }));
    let sharedStrength = 100;

    // Canvas 生成位移图 (替代SVG, 避免CSS mix-blend-mode/filter在feImage中不可用)
    const makeMapURL = (w, h, r, depth) => {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      const img = ctx.createImageData(w, h);
      const d = img.data;
      const hw = w/2, hh = h/2, br = r;
      const gsx = Math.ceil((r/w)*15)/100, gex = 1 - gsx;
      const gsy = Math.ceil((r/h)*15)/100, gey = 1 - gsy;
      const cutW = w - 2*depth, cutH = h - 2*depth;
      const cutHw = cutW/2, cutHh = cutH/2;
      const cutR = Math.max(0, r - depth);
      const ss = t => t*t*(3-2*t);

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const ex = x - hw, ey = y - hh;
          const i = (y*w + x)*4;

          // X渐变: #F00→#000 → R=255(左)→0(右)
          const nx = (ex/hw)*0.5+0.5;
          const tx = Math.max(0, Math.min(1, (nx-gsx)/(gex-gsx||0.01)));
          const gradR = (1-tx)*255;
          // Y渐变: #0F0→#000 → G=255(上)→0(下)
          const ny = (ey/hh)*0.5+0.5;
          const ty = Math.max(0, Math.min(1, (ny-gsy)/(gey-gsy||0.01)));
          const gradG = (1-ty)*255;

          // 挖空蒙版
          const cutSdf = (() => {
            const dx = Math.abs(ex) - cutHw + cutR;
            const dy = Math.abs(ey) - cutHh + cutR;
            return Math.sqrt(Math.max(dx,0)**2 + Math.max(dy,0)**2) + Math.min(Math.max(dx,dy),0) - cutR;
          })();
          const inside = -cutSdf;
          const cutMask = ss(Math.max(0, Math.min(1, (inside+depth)/(depth*2||1))));

          d[i]   = Math.max(0, Math.min(255, gradR*(1-cutMask) + 128*cutMask));
          d[i+1] = Math.max(0, Math.min(255, gradG*(1-cutMask) + 128*cutMask));
          d[i+2] = 128; d[i+3] = 255;
        }
      }
      ctx.putImageData(img, 0, 0);
      return c.toDataURL();
    };

    const makeFilter = (id, mapURL, strength, ca, w, h) => {

        `<feDisplacementMap in="SourceGraphic" in2="dm" scale="${strength + ca*2}" xChannelSelector="R" yChannelSelector="G"/>` +

    const rebuildAllFilters = () => {
      let html = '';

        const s = states[i];

        const ca = s.caOn ? s.ca : 0;
        const mapURL = makeMapURL(s.w, s.h, s.r, depth);

    rebuildAllFilters();

    const card = document.createElement('div');
    card.style.cssText = 'grid-column:1/-1;background:#141412;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.06);';

    const bgDefs = [
      { name:'文字测试', css:'#111 url("data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><rect fill="#111" width="300" height="300"/><text x="10" y="40" fill="#fff" font-size="18" font-family="Arial">Liquid Glass</text><text x="10" y="70" fill="#f00" font-size="24" font-weight="bold">RGB 色散文字</text><text x="10" y="100" fill="#0f0" font-size="14">Chromatic Aberration</text><text x="10" y="130" fill="#09f" font-size="14">feDisplacementMap</text><circle cx="80" cy="180" r="25" fill="#e94560"/><rect x="140" y="160" width="50" height="50" fill="#0f9"/><circle cx="220" cy="180" r="30" fill="none" stroke="#fff" stroke-width="1.5"/><line x1="10" y1="230" x2="290" y2="230" stroke="rgba(255,255,255,0.3)" stroke-width="1"/><line x1="10" y1="232" x2="290" y2="232" stroke="rgba(255,255,255,0.3)" stroke-width="1"/><line x1="150" y1="10" x2="150" y2="290" stroke="rgba(255,255,255,0.15)" stroke-width="1"/><text x="10" y="270" fill="rgba(255,255,255,0.4)" font-size="10">← 网格线 + 彩色圆圈 + 文字 →</text></svg>') + '") center/cover no-repeat' },

    grid.appendChild(card);

    // 绑定交互
    const updateLens = (i) => {

      // 拖动
      let dragging = false, sx, sy, ol, ot, dragged = false;

        dragging = false;

      lens.addEventListener('pointerleave', () => {
        if (dragging) { dragging = false; states[i].depthMul = 1; updateLens(i); }
      });
    });
    return;
  }

  // ══ 自适应玻璃颜色测试 ══
  if (tc.adaptiveGlass) {
    const bgSamples = [
      { name:'极暗(夜景/深色UI)', lum:0.12, css:'#0a0a08' },

    const gridBg = 'linear-gradient(to right,rgba(255,255,255,0.25) 1px,transparent 1px) 0 0/16px 16px,' +

        '<div style="position:absolute;left:22%;top:55%;width:22px;height:22px;background:#0f9;border-radius:2px;"></div>' +
        '<div style="position:absolute;left:65%;top:25%;width:32px;height:32px;background:#ffb700;border-radius:6px;"></div>' +

        if (eShape === 'circle' || eShape === 'capsule') { ePrevR = eR; eR = Math.floor(Math.min(eW, eH) / 2); }
        else { eR = ePrevR; }
        extCard.querySelector('#ext-r').value = eR; extCard.querySelector('#ext-v-r').textContent = Math.round(eR);
        eRefresh();
      });
    });
    // ══ 逐档参数调节面板 ══
    // ══ 逐档参数调节面板 ══
    const tierCard = document.createElement('div');
    tierCard.style.cssText = 'grid-column:1/-1;background:#141412;border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.06);margin-top:12px;';
    tierCard.innerHTML = '<h3 style="color:#c8a87c;margin-bottom:2px;">逐档参数调节 — 4档独立调试</h3>' +
      '<p style="font-size:0.65rem;opacity:0.35;margin-bottom:8px;">每个亮度档位的 brightness / bgAlpha / tintOpacity 独立可调。改动立即刷新所有透镜。</p>' +
      '<div id="ad-tier-controls" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;"></div>';
    grid.appendChild(tierCard);
    const tierCtrl = tierCard.querySelector('#ad-tier-controls');

    const refreshFromTiers = () => {
      // 重新构建 applyAdaptive 使用的数据已在 adTiers 中，直接刷新所有透镜
      const lum = parseFloat(document.getElementById('ad-dyn-lum').value) / 100;
      setDynTarget(lum);
      refreshAllLens();
      // 更新手动亮度行的显示
      const av = applyAdaptive(parseFloat(document.getElementById('ad-lum-slider').value) / 100);
      document.getElementById('ad-lum-blur').textContent = av.brightness.toFixed(2);
      document.getElementById('ad-lum-bga').textContent = av.bgAlpha.toFixed(2);
      document.getElementById('ad-lum-tc').style.background = av.tc;
    };

    adTiers.forEach((tier, ti) => {
      const col = document.createElement('div');
      col.style.cssText = 'flex:1;min-width:170px;max-width:240px;display:flex;flex-direction:column;gap:4px;padding:8px;background:rgba(255,255,255,0.03);border-radius:8px;border:1px solid rgba(255,255,255,0.05);';
      col.innerHTML = '<div style="font-size:0.7rem;color:#c8a87c;text-align:center;margin-bottom:2px;">' + tier.name + '</div>' +
        makeTierSlider('br', 'brightness', tier.brightness, 0.3, 1.5, 0.01, ti) +
        makeTierSlider('bg', 'bgAlpha', tier.bgAlpha, 0, 0.4, 0.005, ti) +
        makeTierSlider('tint', 'tintOpacity', tier.tintOpacity, 0, 0.6, 0.005, ti);
      tierCtrl.appendChild(col);
    });

    function makeTierSlider(label, prop, val, min, max, step, ti) {
      const id = 'ad-tier-' + ti + '-' + label;
      const fmt = step < 0.01 ? 3 : 2;
      return '<div style="display:flex;align-items:center;gap:4px;font-size:0.58rem;color:#888;">' +
        '<span style="min-width:24px;">' + label + '</span>' +
        '<input type="range" id="' + id + '" min="' + min + '" max="' + max + '" value="' + val + '" step="' + step + '" style="flex:1;">' +
        '<b style="color:#c8a87c;min-width:34px;text-align:right;font-size:0.58rem;" id="' + id + '-v">' + val.toFixed(fmt) + '</b>' +
      '</div>';
    }

    // 绑定每个滑块
    adTiers.forEach((tier, ti) => {
      ['br','bg','tint'].forEach(key => {
        const sl = document.getElementById('ad-tier-' + ti + '-' + key);
        const vl = document.getElementById('ad-tier-' + ti + '-' + key + '-v');
        if (!sl || !vl) return;
        const prop = key === 'br' ? 'brightness' : key === 'bg' ? 'bgAlpha' : 'tintOpacity';
        const fmt = prop === 'brightness' || prop === 'tintOpacity' ? 2 : 3;
        sl.addEventListener('input', () => {
          const v = parseFloat(sl.value);
          tier[prop] = v;
          vl.textContent = v.toFixed(fmt);
          refreshFromTiers();
        });
      });
    });

    return;
  }

  // 生成位移图
  let mapCanvas, mapURL;

  if (tc.useSVGDisplacementMap) {
    // CodeSandbox 原文: SVG位移图 (mix-blend-mode:screen + blur挖空)
    const w = 100, h = 100, r = 24, depth = 10;
    const gsy = Math.ceil((r/h)*15);
    const gey = Math.floor(100-(r/h)*15);
    const gsx = Math.ceil((r/w)*15);
    const gex = Math.floor(100-(r/w)*15);
    const svgSrc = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
<style>.mix{mix-blend-mode:screen}</style>
<defs>
  <linearGradient id="Y" x1="0" x2="0" y1="${gsy}%" y2="${gey}%">
    <stop offset="0%" stop-color="#0F0"/><stop offset="100%" stop-color="#000"/>
  </linearGradient>
  <linearGradient id="X" x1="${gsx}%" x2="${gex}%" y1="0" y2="0">
    <stop offset="0%" stop-color="#F00"/><stop offset="100%" stop-color="#000"/>
  </linearGradient>
</defs>
<rect x="0" y="0" width="${w}" height="${h}" fill="#808080"/>
<g filter="blur(2px)">
  <rect x="0" y="0" width="${w}" height="${h}" fill="#000080"/>
  <rect x="0" y="0" width="${w}" height="${h}" fill="url(#Y)" class="mix"/>
  <rect x="0" y="0" width="${w}" height="${h}" fill="url(#X)" class="mix"/>
  <rect x="${depth}" y="${depth}" width="${w-2*depth}" height="${h-2*depth}" fill="#808080" rx="${r}" ry="${r}" filter="blur(${depth}px)"/>
</g>
</svg>`;
    mapURL = 'data:image/svg+xml,' + encodeURIComponent(svgSrc);
    mapCanvas = null;
  } else if (tc.useSVGGrad) {
    mapCanvas = null;
    const svgSrc = `<svg xmlns="http://www.w3.org/2000/svg" width="${MAP_SZ}" height="${MAP_SZ}">
      <defs>
        <linearGradient id="gx" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#008080"/><stop offset="50%" stop-color="#808080"/><stop offset="100%" stop-color="#FF8080"/>
        </linearGradient>
        <linearGradient id="gy" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#800080"/><stop offset="50%" stop-color="#808080"/><stop offset="100%" stop-color="#80FF80"/>
        </linearGradient>
      </defs>
      <rect width="${MAP_SZ}" height="${MAP_SZ}" fill="url(#gx)"/>
      <rect width="${MAP_SZ}" height="${MAP_SZ}" fill="url(#gy)" opacity="0.5"/>
    </svg>`;
    mapURL = 'data:image/svg+xml,' + encodeURIComponent(svgSrc);
  } else if (tc.buildMap) {
    mapCanvas = tc.buildMap();
    mapURL = mapCanvas.toDataURL();
  } else {
    mapCanvas = null;
    mapURL = null;
  }

  // 构建滤镜
  let filterHTML;
  if (tc.turbulenceOnly) {
    // feTurbulence only (custom params)
    filterHTML = `<filter id="f-${tc.id}" x="-30%" y="-30%" width="160%" height="160%"${tc.srgb?' color-interpolation-filters="sRGB"':''}>
      <feTurbulence type="fractalNoise" baseFrequency="${tc.turbFreq||0.015}" numOctaves="2" seed="1" result="n"/>
      <feGaussianBlur in="n" stdDeviation="${tc.turbBlur||3}" result="s"/>
      <feDisplacementMap in="SourceGraphic" in2="s" scale="${tc.turbScale||100}" xChannelSelector="R" yChannelSelector="G"/>
    </filter>`;
  } else if (tc.turbulence && !mapURL) {
    // feTurbulence only (default)
    filterHTML = `<filter id="f-${tc.id}" x="-30%" y="-30%" width="160%" height="160%"${tc.srgb?' color-interpolation-filters="sRGB"':''}>
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="1" result="n"/>
      <feGaussianBlur in="n" stdDeviation="3" result="s"/>
      <feDisplacementMap in="SourceGraphic" in2="s" scale="${tc.turbScale||100}" xChannelSelector="R" yChannelSelector="G"/>
    </filter>`;
  } else if (tc.turbulence && mapURL) {
    // Radial + turbulence blend
    filterHTML = `<filter id="f-${tc.id}" x="-30%" y="-30%" width="160%" height="160%"${tc.srgb?' color-interpolation-filters="sRGB"':''}>
      <feImage href="${mapURL}" result="dm" preserveAspectRatio="xMidYMid slice"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="7" result="tb"/>
      <feColorMatrix type="matrix" in="tb" result="tg" values="0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0.33 0.33 0.33 0 0  0 0 0 1 0"/>
      <feComposite in="tg" in2="dm" operator="arithmetic" k1="0" k2="${(tc.turbScale/100).toFixed(2)}" k3="${(1-tc.turbScale/100).toFixed(2)}" k4="0" result="cm"/>
      <feDisplacementMap in="SourceGraphic" in2="cm" scale="100" xChannelSelector="R" yChannelSelector="G"/>
    </filter>`;
  } else {
    // feImage only
    filterHTML = `<filter id="f-${tc.id}" x="-30%" y="-30%" width="160%" height="160%"${tc.srgb?' color-interpolation-filters="sRGB"':''}>
      <feImage href="${mapURL}" result="dm" preserveAspectRatio="xMidYMid slice"/>
      <feDisplacementMap in="SourceGraphic" in2="dm" scale="100" xChannelSelector="R" yChannelSelector="G"/>
    </filter>`;
  }

  // 创建隐藏 SVG
  const svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svgEl.classList.add('hidden-svg');
  svgEl.setAttribute('aria-hidden', 'true');
  svgEl.innerHTML = `<defs>${filterHTML}</defs>`;
  document.body.appendChild(svgEl);

  // 创建面板
  const card = document.createElement('div'); card.className = 'box';
  let thumbHTML;
  if (mapCanvas) {
    thumbHTML = `<div class="thumb-row"><canvas width="${MAP_SZ}" height="${MAP_SZ}"></canvas><span>实际位移图</span></div>`;
  } else if (tc.useSVGDisplacementMap || tc.useSVGGrad) {
    thumbHTML = `<div class="thumb-row"><img src="${mapURL}" width="48" height="48" style="border-radius:6px;border:1px solid rgba(255,255,255,0.1)"><span>SVG渐变位移图</span></div>`;
  } else if (tc.turbulenceOnly || (tc.turbulence && !mapCanvas)) {
    thumbHTML = `<div class="thumb-row"><span style="opacity:0.3">无位移图 (纯turbulence)</span></div>`;
  } else {
    thumbHTML = '';
  }

  card.innerHTML = `
    <h3>${tc.title}</h3>
    <p class="desc">${tc.desc}</p>
    <div class="stage" id="stage-${tc.id}">
      <div class="stage-bg"></div>
      <div class="lens" id="lens-${tc.id}" style="${tc.debug ? `background: url(${mapURL}) center/100% 100%; border: 2px solid #c8a87c;` : ''}backdrop-filter: url(#f-${tc.id}) blur(3px) saturate(1.2)"></div>
    </div>
    <div class="btns">
      <button data-size="wide">宽</button>
      <button data-size="narrow" class="on">窄</button>
    </div>
    ${thumbHTML}
  `;
  grid.appendChild(card);

  // 复制位移图缩略图
  if (mapCanvas) {
    const thumb = card.querySelector('canvas');
    if (thumb) {
      thumb.getContext('2d').drawImage(mapCanvas, 0, 0);
    }
  }

  // ── 拖动 ──
  const lens = card.querySelector('.lens');
  const stage = card.querySelector('.stage');
  let dragging = false, sx, sy, ol, ot, dragged = false;

  lens.addEventListener('pointerdown', e => {
    dragging = true; lens.setPointerCapture(e.pointerId);
    sx = e.clientX; sy = e.clientY;
    if (!dragged) {
      const lr = lens.getBoundingClientRect(), sr = stage.getBoundingClientRect();
      ol = lr.left - sr.left; ot = lr.top - sr.top;
      lens.style.left = ol + 'px'; lens.style.top = ot + 'px';
      lens.style.transform = 'none';
      dragged = true;
    } else {
      ol = parseFloat(lens.style.left)||0; ot = parseFloat(lens.style.top)||0;
    }
  });
  lens.addEventListener('pointermove', e => {
    if (!dragging) return;
    lens.style.left = (ol + e.clientX - sx) + 'px';
    lens.style.top = (ot + e.clientY - sy) + 'px';
  });
  lens.addEventListener('pointerup', () => { dragging = false; });

  // ── 尺寸切换 ──
  card.querySelectorAll('[data-size]').forEach(btn => {
    btn.addEventListener('click', () => {
      card.querySelectorAll('[data-size]').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      lens.classList.toggle('wide', btn.dataset.size === 'wide');
      lens.style.left = '50%'; lens.style.top = '50%';
      lens.style.transform = 'translate(-50%,-50%)';
      dragged = false;
    });
  });
});

// ══ 全屏亮度扫描 ══
let lumaScanOn = false, lumaScanId = 0;
const lumaCanvas = document.getElementById('luma-overlay');
const lumaBtn = document.getElementById('luma-overlay-toggle');
const lumaCtx = lumaCanvas.getContext('2d');

function rgbToLum(r,g,b) { return 0.2126*(r/255)+0.7152*(g/255)+0.0722*(b/255); }

function lumToColor(lum) {
  // 蓝(暗)→青→绿→黄→红(亮)
  const t = Math.max(0,Math.min(1,lum));
  let r,g,b;
  if (t<0.25) { r=0; g=Math.round(t*4*255); b=255; }
  else if (t<0.5) { r=0; g=255; b=Math.round((0.5-t)*4*255); }
  else if (t<0.75) { r=Math.round((t-0.5)*4*255); g=255; b=0; }
  else { r=255; g=Math.round((1-t)*4*255); b=0; }
  return 'rgb('+r+','+g+','+b+')';
}

function scanLuma() {
  if (!lumaScanOn) return;
  const step = 30; // 每30px一个采样点
  lumaCanvas.width = window.innerWidth;
  lumaCanvas.height = window.innerHeight;
  lumaCtx.clearRect(0,0,lumaCanvas.width,lumaCanvas.height);

  for (let y = step/2; y < window.innerHeight; y += step) {
    for (let x = step/2; x < window.innerWidth; x += step) {
      try {
        const els = document.elementsFromPoint(x, y);
        let lum = null;
        for (const el of els) {
          if (el === lumaCanvas || el.classList.contains('hidden-svg')) continue;
          const bg = getComputedStyle(el).backgroundColor;
          const m = bg && bg.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
          if (m) {
            lum = rgbToLum(parseInt(m[1]),parseInt(m[2]),parseInt(m[3]));
            break;
          }
        }
        if (lum !== null) {
          lumaCtx.fillStyle = lumToColor(lum);
          lumaCtx.fillRect(x-4, y-4, 8, 8);
          lumaCtx.fillStyle = lum > 0.5 ? '#000' : '#fff';
          lumaCtx.font = '8px monospace';
          lumaCtx.fillText((lum*100).toFixed(0), x+5, y+4);
        }
      } catch(e) {}
    }
  }
  lumaScanId = requestAnimationFrame(scanLuma);
}

lumaBtn.addEventListener('click', () => {
  lumaScanOn = !lumaScanOn;
  lumaBtn.textContent = lumaScanOn ? '🔍 全屏亮度扫描 ON' : '🔍 全屏亮度扫描 OFF';
  lumaBtn.style.background = lumaScanOn ? 'rgba(200,168,124,0.2)' : 'rgba(255,255,255,0.08)';
  lumaCanvas.style.display = lumaScanOn ? 'block' : 'none';
  if (lumaScanOn) scanLuma();
  else { cancelAnimationFrame(lumaScanId); lumaCtx.clearRect(0,0,lumaCanvas.width,lumaCanvas.height); }
});

console.log('%c🧊 液态玻璃全方案测试 — 10个方案已加载',
  'font-size:1.1em;color:#c8a87c');
console.log('%c🔍 点击顶部"全屏亮度扫描"按钮 → 全屏网格显示各位置亮度(蓝暗→红亮)',
  'color:#c8a87c');
</script>
